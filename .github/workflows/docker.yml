name: Server image

# Builds the OpenSO server Docker image on GitHub's runners and pushes it to GHCR, so the deploy box never
# has to compile anything — it just `docker compose pull`s the prebuilt image (see docker/DEPLOY.md).
# `latest` always tracks main; each build is also tagged with the commit SHA for pinning/rollback.

on:
  push:
    branches: [ main ]
    paths:
      - 'TSOClient/**'
      - 'docker/Dockerfile'
      - 'docker/entrypoint.sh'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/voicemxil/openso-server:latest
            ghcr.io/voicemxil/openso-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
