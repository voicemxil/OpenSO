name: Server image (edge)

# Builds the OpenSO server Docker image from main and pushes it to GHCR as `:edge` — a DIRTY dev build for
# testing, NOT for production. The deploy box tracks `:release` instead (a stamped image cut only on a
# dev-#/alpha-#/beta-# release by release.yml), so main commits never reach prod. Each edge build is also
# tagged with the commit SHA for pinning/rollback. See docker/DEPLOY.md.

on:
  push:
    branches: [ main ]
    paths:
      - 'TSOClient/**'
      - 'docker/Dockerfile'
      - 'docker/entrypoint.sh'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      # Needed for the type=gha build cache (the default 'docker' driver can't export cache).
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (edge)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            VERSION=edge
          tags: |
            ghcr.io/voicemxil/openso-server:edge
            ghcr.io/voicemxil/openso-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
