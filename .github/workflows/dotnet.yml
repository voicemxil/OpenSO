name: Build OpenSO

# Per-push CI: verify the client and server compile + publish on EVERY supported platform — the same
# matrix the release pipeline (release.yml) ships — so cross-platform breakage is caught on every push,
# not just at release time. Uploads the builds as artifacts for manual testing; does NOT cut a release
# (that's release.yml, triggered by a dev-N tag).

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Compile the effect shaders fresh from source on Windows (the only OS where MonoGame's effect compiler
  # works — it needs Wine on linux/osx). Produces both Content/DX (Windows client) and Content/OGL (DesktopGL
  # clients); the per-platform build-client jobs download the matching set so no client ships a stale .xnb.
  compile-shaders:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
      - name: Compile desktop shaders (DX + OGL)
        shell: bash
        run: bash .github/scripts/compile-shaders.sh
      - uses: actions/upload-artifact@v4
        with:
          name: shaders-dx
          path: TSOClient/tso.content/Content/DX/Effects/
      - uses: actions/upload-artifact@v4
        with:
          name: shaders-ogl
          path: TSOClient/tso.content/Content/OGL/Effects/

  # Client: Windows = FSO.IDE (its output contains the full OpenSO.exe client); the other platforms =
  # FSO.Unix. All four are the supported client targets.
  build-client:
    needs: [ compile-shaders ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, project: TSOClient/FSO.IDE,  rid: win-x64,   asset: OpenSO-client-win-x64 }
          - { os: ubuntu-latest,  project: TSOClient/FSO.Unix, rid: linux-x64, asset: OpenSO-client-linux-x64 }
          - { os: macos-latest,   project: TSOClient/FSO.Unix, rid: osx-x64,   asset: OpenSO-client-osx-x64 }
          - { os: macos-latest,   project: TSOClient/FSO.Unix, rid: osx-arm64, asset: OpenSO-client-osx-arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
      # Overlay the freshly-compiled shaders (from the compile-shaders job) over the committed .xnb so the
      # published client carries shaders built from current source. DX for the Windows client, OGL otherwise.
      - name: Use freshly-compiled shaders
        uses: actions/download-artifact@v4
        with:
          name: shaders-${{ matrix.rid == 'win-x64' && 'dx' || 'ogl' }}
          path: TSOClient/tso.content/Content/${{ matrix.rid == 'win-x64' && 'DX' || 'OGL' }}/Effects
      - name: Publish client
        run: dotnet publish ${{ matrix.project }} -c Release -r ${{ matrix.rid }} --self-contained -o Artifacts/Client
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: Artifacts/Client

  # Server: FSO.Server.Core supports win-x64 + linux-x64 (linux-x64 is the docker/Hetzner deploy target).
  build-server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  rid: linux-x64 }
          - { os: windows-latest, rid: win-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
      - name: Publish server
        run: dotnet publish TSOClient/FSO.Server.Core -c Release -r ${{ matrix.rid }} --self-contained -o Artifacts/Server
      - uses: actions/upload-artifact@v4
        with:
          name: OpenSO-server-${{ matrix.rid }}
          path: Artifacts/Server
