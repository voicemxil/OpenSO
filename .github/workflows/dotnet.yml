name: Build FreeSO

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - run: dotnet publish TSOClient/FSO.IDE -c Release -r win-x64 --self-contained -o Artifacts/Client
    - run: dotnet publish TSOClient/FSO.Server.Core -c Release -r win-x64 --self-contained -o Artifacts/Server

    - name: Upload client artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FreeSOClient
        path: Artifacts/Client

    - name: Upload server artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FreeSOServer
        path: Artifacts/Server
