name: Release OpenSO

# Publishes a GitHub Release with downloadable client + server builds.
# The OpenSO Launcher fetches the latest release and picks the asset whose name contains "client".
#
# Release naming: OpenSO versions are "dev-N" (branch "dev", incrementing integer). The git tag, the
# GitHub Release name, and the version.txt baked INTO the build are all the same string — because at
# login the client/server compare their version.txt against the server's advertised "<branch>-<version>"
# to decide whether to auto-update. FreeSO's base build shipped as dev-0, so the first OpenSO release
# is dev-1, then dev-2, ...
#
# Trigger by pushing a version tag, e.g.:
#   git tag dev-1 && git push origin dev-1
# or run it manually from the Actions tab (workflow_dispatch), supplying the version.

on:
  push:
    # Semver tags (vMAJOR.MINOR.PATCH) are the current scheme; legacy dev-/alpha-/beta- kept so old
    # tags still resolve. version.txt is stamped from the tag, so the build self-reports e.g. v0.1.0.
    tags: [ "v[0-9]*", "dev-*", "alpha-*", "beta-*" ]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0). Used when run manually."
        required: false
        default: "v0.0.0"

permissions:
  contents: write   # required to create the GitHub Release
  packages: write   # required to push the server image to GHCR

jobs:
  # ---- Client builds. The Windows client is FSO.IDE (net9.0-windows) — the same project the
  #      original "Build FreeSO" CI published; it references FSO.Windows so its output folder
  #      contains the full client (OpenSO.exe) plus the IDE/JIT tooling. The cross-platform client
  #      is FSO.Unix (net9.0), which also produces OpenSO.exe. The launcher downloads the asset whose
  #      name contains "client" and runs OpenSO.exe.
  build-client:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            project: TSOClient/FSO.IDE
            rid: win-x64
            asset: OpenSO-client-win-x64
          - os: ubuntu-latest
            project: TSOClient/FSO.Unix
            rid: linux-x64
            asset: OpenSO-client-linux-x64
          - os: macos-latest
            project: TSOClient/FSO.Unix
            rid: osx-x64
            asset: OpenSO-client-osx-x64
          - os: macos-latest
            project: TSOClient/FSO.Unix
            rid: osx-arm64
            asset: OpenSO-client-osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.315"

      - name: Publish client
        run: dotnet publish ${{ matrix.project }} -c Release -r ${{ matrix.rid }} --self-contained -o publish

      - name: Stamp version.txt
        shell: bash
        run: |
          # The build copies tso.common/version.txt (dev-0 placeholder) into the output. Overwrite it with
          # the release version so the client's GetClientVersion() reports the real version and the login
          # update-check works. Also stamp the macOS .app bundle's copy if present.
          if [ "${{ github.ref_type }}" = "tag" ]; then VERSION="${GITHUB_REF_NAME}"; else VERSION="${{ github.event.inputs.version }}"; fi
          echo "Stamping version: $VERSION"
          printf '%s\n' "$VERSION" > publish/version.txt
          if [ -f "publish/OpenSO.app/Contents/MacOS/version.txt" ]; then printf '%s\n' "$VERSION" > "publish/OpenSO.app/Contents/MacOS/version.txt"; fi

      - name: Liquid Glass icon (macOS 26+)
        if: matrix.rid == 'osx-arm64'
        shell: bash
        run: |
          # The osx-arm64 publish builds OpenSO.app (CreateMacAppBundle target) with the legacy
          # Icon.icns. On a runner with Xcode 26+, also compile the Icon Composer .icon into
          # Assets.car and point CFBundleIconName at it, so macOS 26+ shows the Liquid Glass icon.
          # Fully fallback-safe: any missing tool or actool failure just keeps the legacy .icns.
          set -uo pipefail
          APP="publish/OpenSO.app"; ICON="TSOClient/FSO.Unix/openso.icon"
          if [ ! -d "$APP" ] || [ ! -e "$ICON" ] || ! command -v xcrun >/dev/null 2>&1; then
            echo "No .app/.icon/xcrun present — keeping legacy Icon.icns."; exit 0
          fi
          if xcrun actool "$ICON" --compile "$APP/Contents/Resources" \
               --output-partial-info-plist /tmp/openso-icon.plist --app-icon Icon \
               --include-all-app-icons --enable-on-demand-resources NO --development-region en \
               --target-device mac --minimum-deployment-target 26.0 --platform macosx; then
            plutil -insert CFBundleIconName -string Icon "$APP/Contents/Info.plist" 2>/dev/null \
              || plutil -replace CFBundleIconName -string Icon "$APP/Contents/Info.plist"
            echo "Embedded Liquid Glass icon (Assets.car)."
          else
            echo "actool unavailable/failed — keeping legacy Icon.icns."
          fi

      - name: Bundle the in-game patcher (update.exe)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: |
          # The client launches update.exe (FSO.Patcher, AssemblyName=update) to apply downloaded patches,
          # but it isn't part of the client project — bundle it here. Built with the same SDK as the client
          # in this job, so it shares the client's self-contained runtime; only the patcher-specific files
          # need to land in the package.
          dotnet publish TSOClient/FSO.Patcher -c Release -r win-x64 --self-contained -o patcher
          foreach ($f in 'update.exe','update.dll','update.deps.json','update.runtimeconfig.json','update.dll.config','System.Resources.Extensions.dll') {
            if (Test-Path "patcher/$f") { Copy-Item "patcher/$f" "publish/$f" -Force }
          }
          if (-not (Test-Path "publish/update.exe")) { throw "update.exe was not bundled" }

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          ( cd publish && zip -r "../dist/${{ matrix.asset }}.zip" . )
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path publish/* -DestinationPath "dist/${{ matrix.asset }}.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/*

  # ---- Build the server for every supported platform. linux-x64 is the docker/Hetzner deploy target;
  #      win-x64 is also supported (FSO.Server.Core RuntimeIdentifiers) for Windows self-hosters.
  build-server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  rid: linux-x64, asset: OpenSO-server-linux-x64 }
          - { os: windows-latest, rid: win-x64,   asset: OpenSO-server-win-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.315"
      - name: Publish server
        run: dotnet publish TSOClient/FSO.Server.Core -c Release -r ${{ matrix.rid }} --self-contained -o publish
      - name: Stamp version.txt
        shell: bash
        run: |
          # ServerVersion reads version.txt; stamp it so the server reports the release version (the
          # managed-update updateID.txt is separate and created at runtime by the update generator).
          if [ "${{ github.ref_type }}" = "tag" ]; then VERSION="${GITHUB_REF_NAME}"; else VERSION="${{ github.event.inputs.version }}"; fi
          echo "Stamping version: $VERSION"
          printf '%s\n' "$VERSION" > publish/version.txt
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          ( cd publish && zip -r "../dist/${{ matrix.asset }}.zip" . )
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path publish/* -DestinationPath "dist/${{ matrix.asset }}.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/*

  # ---- Build the deploy Docker image for this release and push it to GHCR. The version is stamped INTO
  #      the image (version.txt) so the server self-reports it. Two tags: the immutable release version
  #      (dev-1 / beta-3 / …) for pinning + rollback, and the moving `:release` pointer the deploy box
  #      tracks (its nightly auto-update timer pulls `:release`, so prod only moves when a release is cut).
  #      main builds are `:edge` (docker.yml) and never deployed.
  server-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (stamped release image + moving :release)
        uses: docker/build-push-action@v6
        # Don't upload the .dockerbuild build-record artifact — the release job's download-artifact
        # would try to pull it and fail. (The pattern filter there is the backstop.)
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/voicemxil/openso-server:${{ steps.ver.outputs.version }}
            ghcr.io/voicemxil/openso-server:release
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- Collect every platform's artifacts and publish one GitHub Release.
  release:
    needs: [ build-client, build-server ]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          # Only the client/server build zips — NOT the .dockerbuild provenance artifact that
          # docker/build-push-action uploads from the server-image job (download-artifact chokes on it).
          pattern: OpenSO-*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: OpenSO ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*

  # ---- Generate the incremental (delta) patch vs the PREVIOUS release and attach it to this release.
  #      The server-side UpdateReconciler discovers these assets and publishes the fso_updates delta chain,
  #      so an in-game client patches dev-(N-1) -> dev-N by downloading only the changed files (win-x64).
  client-delta:
    needs: [ release ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.315"
      - name: Resolve this + previous version
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then VER="${GITHUB_REF_NAME}"; else VER="${{ github.event.inputs.version }}"; fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          # Previous STABLE semver release, found by version-sort (the immediately-lower vX.Y.Z). Matches the
          # reconciler's chain order. Empty => baseline / first release => full zip only, no delta.
          # (The old "<branch>-<N-1>" math broke on dotted semver: $((NUM-1)) on "v0.1.3" yields no prev,
          # so the delta step was skipped for every semver release.)
          PREV=$(gh release list -R "$GITHUB_REPOSITORY" --limit 200 --json tagName -q '.[].tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V \
            | awk -v cur="$VER" '$0==cur{print prev; exit} {prev=$0}')
          if [ -n "$PREV" ] && gh release view "$PREV" -R "$GITHUB_REPOSITORY" --json tagName >/dev/null 2>&1; then
            echo "prev=$PREV" >> "$GITHUB_OUTPUT"; echo "Delta base: $PREV -> $VER"
          else
            echo "prev=" >> "$GITHUB_OUTPUT"; echo "No previous semver release before $VER — baseline, skipping delta."
          fi
      - name: Generate + attach delta
        if: steps.ver.outputs.prev != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.ver.outputs.prev }}"    -R "$GITHUB_REPOSITORY" -p OpenSO-client-win-x64.zip -O prev.zip
          gh release download "${{ steps.ver.outputs.version }}" -R "$GITHUB_REPOSITORY" -p OpenSO-client-win-x64.zip -O curr.zip
          dotnet run --project TSOClient/FSO.DeltaGen -c Release -- prev.zip curr.zip "${{ steps.ver.outputs.version }}" out
          gh release upload "${{ steps.ver.outputs.version }}" -R "$GITHUB_REPOSITORY" \
            out/OpenSO-client-win-x64.incremental.zip out/OpenSO-client-win-x64.manifest.json --clobber
